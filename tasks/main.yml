---
- name: Create vector directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ vector_install_dir }}/bin"
    - "{{ vector_config_dir }}"
    - "{{ vector_data_dir }}"
  tags:
    - directories

- name: Download Vector distribution
  ansible.builtin.get_url:
    url: "https://packages.timber.io/vector/{{ vector_version }}/vector-{{ vector_version }}-{{ ansible_architecture }}-unknown-linux-gnu.tar.gz"
    dest: "/tmp/vector-{{ vector_version }}.tar.gz"
    mode: '0644'
  tags:
    - download

- name: Extract Vector archive
  ansible.builtin.unarchive:
    src: "/tmp/vector-{{ vector_version }}.tar.gz"
    dest: /tmp/
    remote_src: true
  tags:
    - install

- name: Find vector binary
  ansible.builtin.find:
    paths: /tmp/
    patterns: "vector"
    file_type: file
    recurse: true
  register: vector_bin_found
  tags:
    - install

- name: Copy vector binary to install dir
  ansible.builtin.copy:
    src: "{{ vector_bin_found.files[0].path }}"
    dest: "{{ vector_install_dir }}/bin/vector"
    mode: '0755'
    remote_src: true
  tags:
    - install

- name: Create symbolic link for convenience
  ansible.builtin.file:
    src: "{{ vector_install_dir }}/bin/vector"
    dest: "/usr/local/bin/vector"
    state: link
    force: true
  tags:
    - install

- name: Deploy Vector configuration
  ansible.builtin.template:
    src: vector.yml.j2
    dest: "{{ vector_config_dir }}/vector.yml"
    mode: '0644'
  notify: Restart vector service
  tags:
    - config

- name: Create Vector systemd service file
  ansible.builtin.template:
    src: vector.service.j2
    dest: /etc/systemd/system/vector.service
    mode: '0644'
  notify: Restart vector service
  tags:
    - config

- name: Start and enable Vector service
  ansible.builtin.systemd:
    name: vector
    state: started
    enabled: true
  tags:
    - service